<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">

  <defs>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff5e00"/>
    </linearGradient>

    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#005bea"/>
    </linearGradient>

    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#b30000"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Explosion Behind -->
  <polygon points="500,60 540,140 620,110 580,190 660,210 580,240 620,320 540,290 500,370 460,290 380,320 420,240 340,210 420,190 380,110 460,140"
           fill="url(#orangeGrad)" filter="url(#shadow)"/>

  <!-- Shield Base -->
  <path d="M350 200 
           Q500 140 650 200 
           L650 340 
           Q500 460 350 340 Z"
        fill="url(#blueGrad)" stroke="#0b1e3d" stroke-width="12" filter="url(#shadow)"/>

  <!-- Inner Compass Circle -->
  <circle cx="500" cy="270" r="90" fill="#ffffff" stroke="#0b1e3d" stroke-width="8"/>
  <polygon points="500,200 520,270 500,340 480,270" fill="url(#redGrad)"/>
  <polygon points="430,270 500,250 570,270 500,290" fill="#0b1e3d"/>

  <!-- Ribbon Top -->
  <path d="M280 170 Q500 110 720 170 L700 230 Q500 180 300 230 Z"
        fill="url(#orangeGrad)" stroke="#7a2e00" stroke-width="10" filter="url(#shadow)"/>

  <!-- Ribbon Bottom -->
  <path d="M320 330 Q500 380 680 330 L660 390 Q500 430 340 390 Z"
        fill="url(#redGrad)" stroke="#5a0000" stroke-width="10" filter="url(#shadow)"/>

  <!-- Side Flags -->
  <polygon points="350,200 280,230 320,280" fill="#ffcc00" stroke="#7a5a00" stroke-width="6"/>
  <polygon points="650,200 720,230 680,280" fill="#4ecbff" stroke="#003366" stroke-width="6"/>

  <!-- Main 404 Text -->
  <text x="500" y="210" text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-size="110"
        fill="#ffffff"
        stroke="#1a1a1a"
        stroke-width="6"
        filter="url(#shadow)">
    404
  </text>

  <!-- Subtitle -->
  <text x="500" y="375" text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-size="55"
        fill="#ffffff"
        stroke="#1a1a1a"
        stroke-width="4">
    LOST IN THE GAME
  </text>

</svg>
